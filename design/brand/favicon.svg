<?xml version="1.0" encoding="UTF-8"?>
<!--
  conet � favicon
  Optimized for 16/32px display: dark square, ink mesh nodes, single lime.
  Uses fixed colors so it renders correctly inside browser tab UI regardless
  of system theme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="3" fill="#0A0B0A"/>
  <g stroke="#F2F1EE" stroke-width="0.9" stroke-linecap="square" opacity="0.30">
    <line x1="8"  y1="8"  x2="24" y2="8"/>
    <line x1="8"  y1="16" x2="24" y2="16"/>
    <line x1="8"  y1="24" x2="24" y2="24"/>
    <line x1="8"  y1="8"  x2="8"  y2="24"/>
    <line x1="16" y1="8"  x2="16" y2="24"/>
    <line x1="24" y1="8"  x2="24" y2="24"/>
  </g>
  <g fill="#F2F1EE">
    <circle cx="8"  cy="8"  r="1.7"/>
    <circle cx="16" cy="8"  r="1.7"/>
    <circle cx="8"  cy="16" r="1.7"/>
    <circle cx="16" cy="16" r="1.7"/>
    <circle cx="24" cy="16" r="1.7"/>
    <circle cx="8"  cy="24" r="1.7"/>
    <circle cx="16" cy="24" r="1.7"/>
    <circle cx="24" cy="24" r="1.7"/>
  </g>
  <circle cx="24" cy="8" r="2.6" fill="#B6FF1A"/>
</svg>
