<?xml version="1.0" encoding="UTF-8"?>
<!--
  conet � logo mark
  3x3 mesh node grid. Eight ink nodes, one lime "live" node (top-right).
  Hairlines are drawn through the grid implying network adjacency.
  Master is 24�24; renders crisp from 16px up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-label="conet">
  <!-- mesh hairlines (currentColor at low opacity so it tints with theme) -->
  <g stroke="currentColor" stroke-width="0.75" stroke-linecap="square" opacity="0.35">
    <line x1="5"  y1="5"  x2="19" y2="5"/>
    <line x1="5"  y1="12" x2="19" y2="12"/>
    <line x1="5"  y1="19" x2="19" y2="19"/>
    <line x1="5"  y1="5"  x2="5"  y2="19"/>
    <line x1="12" y1="5"  x2="12" y2="19"/>
    <line x1="19" y1="5"  x2="19" y2="19"/>
  </g>
  <!-- 8 ink nodes -->
  <g fill="currentColor">
    <circle cx="5"  cy="5"  r="1.5"/>
    <circle cx="12" cy="5"  r="1.5"/>
    <circle cx="5"  cy="12" r="1.5"/>
    <circle cx="12" cy="12" r="1.5"/>
    <circle cx="19" cy="12" r="1.5"/>
    <circle cx="5"  cy="19" r="1.5"/>
    <circle cx="12" cy="19" r="1.5"/>
    <circle cx="19" cy="19" r="1.5"/>
  </g>
  <!-- 1 signal node (top-right)  fixed lime, never theme-driven -->
  <circle cx="19" cy="5" r="2.2" fill="#B6FF1A"/>
  <circle cx="19" cy="5" r="3.6" fill="#B6FF1A" opacity="0.18"/>
</svg>
